{% extends 'wirt_pages/base.html' %}
{% load django_bootstrap5 %}

{% block page_header %}
    <h1>Log in to your account.</h1>
{% endblock page_header %}

{% block content %}

    <form action="{% url 'accounts:login' %}", method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        {% bootstrap_button button_type="submit" content="Login" %}
    </form>
    
{% endblock content %}
