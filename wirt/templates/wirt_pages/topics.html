{% extends 'wirt_pages/base.html' %}

{% block content %}
    <p>Topics</p>
    <ul>
    {% for topic in topics %}
        <li><a href="{% url 'wirt:topic' topic.id %}">{{topic.text}}</a></li>
    {% empty %}
        <li>No topics have been added yet.</li>

    {% endfor %}
    </ul>

    <a href="{% url 'wirt:new_topic' %}">Add a new topic</a>
{% endblock content %}
